version: '3.8'

services:
  postgres:
    image: postgres:latest
    container_name: postgres_sim
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/vds_db:/var/lib/postgresql/dada
    ports:
      - "${DB_PORT}:5432"
volumes:
  postgres_data:


