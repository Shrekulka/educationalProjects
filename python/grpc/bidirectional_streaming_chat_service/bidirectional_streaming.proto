// bidirectional_streaming_chat_service/bidirectional_streaming.proto

// Определяем версию синтаксиса Protocol Buffers
syntax = "proto3";

// Определяем пространство имен для наших сообщений и сервисов
package chat;

// Сообщение для отправки в чат
message ChatMessage {
    string user_name = 1;
    string message = 2;
    int64 timestamp = 3;
}

// Сервис чата
service ChatService {
    // Метод для двунаправленного потокового RPC
    rpc Chat(stream ChatMessage) returns (stream ChatMessage) {}
}