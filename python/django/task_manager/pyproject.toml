[tool.ruff]
# Python 3.13
target-version = "py313"

# Длина строки
line-length = 100

# Исключить некоторые папки
exclude = [
    ".git",
    "__pycache__",
    "venv",
    ".venv",
    "migrations",
    "node_modules",
]

[tool.ruff.lint]
# Enabled rules
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
]

# Ignore specific rules
ignore = [
    "E501",  # line too long (используем line-length вместо этого)
    "B008",  # do not perform function calls in argument defaults
]

[tool.ruff.lint.isort]
# isort конфиг для сортировки импортов
known-first-party = ["apps", "config"]