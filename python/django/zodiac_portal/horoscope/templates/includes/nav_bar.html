<nav>
    <a href="{% url 'horoscope-index' %}">Главная</a>
    <a href="https://www.homeenglish.ru/OtherGoroscop.htm">Источник</a>
    {% if zodiacs %}
        <br><br>
        {% for zodiac in zodiacs %}
            <a style="color: {% if forloop.counter|divisibleby:2 %}red{% else %}green{% endif %};"
               href="{% url 'horoscope-name' sign_zodiac=zodiac.name %}">
                {{ zodiac.name|title }}
            </a>
        {% endfor %}

    {% endif %}
</nav>
